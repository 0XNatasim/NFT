[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib", "../node_modules"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 1000
evm_version = "cancun"

remappings = [
    "@openzeppelin/contracts/=../node_modules/@openzeppelin/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256

# Marketplace order expiry must compare signed deadlines against the current
# block timestamp. The app uses user-selected expiry windows, so small validator
# timestamp drift does not influence settlement economics; suppress this known
# low-severity lint to keep `forge build` clean.
[lint]
without_lints = ["block-timestamp"]
